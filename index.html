<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FNCS DROP PRO</title>

<style>
body {
    margin: 0;
    background: #0b0f1a;
    color: white;
    font-family: Arial;
    text-align: center;
}

h1 { margin: 15px; }

.controls { margin: 10px; }

button {
    background: #00ff88;
    border: none;
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

canvas {
    border-radius: 12px;
    cursor: grab;
}
</style>
</head>

<body>

<h1>🎯 FNCS DROP PRO</h1>

<div class="controls">
    <button onclick="modo='start'">Início ônibus</button>
    <button onclick="modo='end'">Fim ônibus</button>
    <button onclick="modo='drop'">Drop</button>
    <button onclick="reset()">Reset</button>
</div>

<canvas id="mapa" width="900" height="900"></canvas>

<script>
const canvas = document.getElementById("mapa");
const ctx = canvas.getContext("2d");

const mapa = new Image();
mapa.src = "mapa.jpg";

let modo = "start";

let busStart = null;
let busEnd = null;
let drop = null;

// ================= ZOOM / PAN =================
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let dragging = false;
let lastX, lastY;

canvas.addEventListener("mousedown", e=>{
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
});

canvas.addEventListener("mouseup", ()=> dragging = false);

canvas.addEventListener("mousemove", e=>{
    if(dragging){
        offsetX += e.clientX - lastX;
        offsetY += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        desenhar();
    }
});

canvas.addEventListener("wheel", e=>{
    e.preventDefault();
    const zoom = e.deltaY < 0 ? 1.1 : 0.9;
    scale *= zoom;
    desenhar();
});

// ================= CLIQUE =================
canvas.addEventListener("click", e=>{
    const rect = canvas.getBoundingClientRect();

    const x = (e.clientX - rect.left - offsetX)/scale;
    const y = (e.clientY - rect.top - offsetY)/scale;

    if(modo === "start") busStart = {x,y};
    if(modo === "end") busEnd = {x,y};
    if(modo === "drop") drop = {x,y};

    desenhar();
});

function reset(){
    busStart = busEnd = drop = null;
    desenhar();
}

// ================= FNCS SYSTEM =================
const FNCS = {
    placement: {1:65,2:56,3:52,4:48,5:44,6:40,7:38,8:36,9:34,10:32},
    kill: 2
};

function calcularPontos(partidas, placement, kills){
    let total = 0;

    for(let i=0;i<partidas;i++){
        total += (FNCS.placement[Math.round(placement)]||0) + (kills*FNCS.kill);
    }

    return total;
}

// ================= IA MELHOR GOD =================
function melhorGod(){
    const dx = busEnd.x - busStart.x;
    const dy = busEnd.y - busStart.y;

    const len = Math.hypot(dx,dy);
    const nx = dx/len;
    const ny = dy/len;

    const px = -ny;
    const py = nx;

    let best = null;
    let bestScore = Infinity;

    for(let d=200; d<=400; d+=20){
        for(let lat=-120; lat<=120; lat+=20){

            const x = drop.x - nx*d + px*lat;
            const y = drop.y - ny*d + py*lat;

            const dist = Math.hypot(drop.x-x, drop.y-y);
            const tempo = dist / 120;

            const score = tempo + Math.abs(lat)*0.01;

            if(score < bestScore){
                bestScore = score;
                best = {x,y,tempo};
            }
        }
    }

    return best;
}

// ================= SETA ÔNIBUS =================
function seta(x,y,dx,dy){
    const ang = Math.atan2(dy,dx);

    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(ang);

    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(-8,-4);
    ctx.lineTo(-8,4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

// ================= DESENHAR =================
function desenhar(){

    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.setTransform(scale,0,0,scale,offsetX,offsetY);
    ctx.drawImage(mapa,0,0,canvas.width,canvas.height);

    // ônibus direção
    if(busStart && busEnd){
        const dx = busEnd.x - busStart.x;
        const dy = busEnd.y - busStart.y;

        for(let i=0;i<25;i++){
            const t = i/25;
            const x = busStart.x + dx*t;
            const y = busStart.y + dy*t;
            seta(x,y,dx,dy);
        }
    }

    // IA drop
    if(busStart && busEnd && drop){

        const best = melhorGod();

        const control = {
            x: (best.x + drop.x)/2,
            y: (best.y + drop.y)/2 - 80
        };

        // curva
        ctx.strokeStyle="yellow";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(best.x,best.y);
        ctx.quadraticCurveTo(control.x,control.y,drop.x,drop.y);
        ctx.stroke();

        // ponto IA
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(best.x,best.y,10,0,Math.PI*2);
        ctx.fill();

        // drop
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(drop.x,drop.y,8,0,Math.PI*2);
        ctx.fill();

        // tempo
        ctx.fillStyle="white";
        ctx.fillText(best.tempo.toFixed(1)+"s", best.x+10, best.y-10);
    }

    if(busStart){
        ctx.fillStyle="#00ffff";
        ctx.beginPath();
        ctx.arc(busStart.x,busStart.y,6,0,Math.PI*2);
        ctx.fill();
    }

    if(busEnd){
        ctx.fillStyle="#00ffff";
        ctx.beginPath();
        ctx.arc(busEnd.x,busEnd.y,6,0,Math.PI*2);
        ctx.fill();
    }
}

mapa.onload = desenhar;
</script>

</body>
</html>
