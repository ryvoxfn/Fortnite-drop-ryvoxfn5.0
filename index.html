<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FNCS Drop Calculator PRO</title>

<style>
body{
    margin:0;
    background:#0b0f1a;
    font-family:Arial, Helvetica, sans-serif;
    color:white;
    text-align:center;
}

h1{
    margin:15px;
}

#controls{
    margin:10px;
}

button{
    background:#00ff88;
    border:none;
    padding:10px 15px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

#mapa{
    position:relative;
    display:inline-block;
}

#mapa img{
    width:900px;
    border-radius:10px;
}

.point{
    position:absolute;
    width:12px;
    height:12px;
    border-radius:50%;
    transform:translate(-50%,-50%);
}

.bus{ background:#00aaff; }
.drop{ background:red; }

.line{
    position:absolute;
    height:3px;
    background:yellow;
    transform-origin:left;
}

.curve{
    position:absolute;
    border:2px dashed yellow;
    border-radius:50%;
}

.pin{
    position:absolute;
    transform:translate(-50%,-100%);
    font-size:22px;
}

.time{
    position:absolute;
    font-size:14px;
    color:#00ffcc;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🎯 FNCS DROP PRO</h1>

<div id="controls">
    <button onclick="setMode('busStart')">Início ônibus</button>
    <button onclick="setMode('busEnd')">Fim ônibus</button>
    <button onclick="setMode('drop')">Drop</button>
    <button onclick="resetAll()">Reset</button>
</div>

<div id="mapa">
    <img src="mapa.jpg" id="mapImg">
</div>

<script>
let mode = "";
let busStart = null;
let busEnd = null;
let drops = [];

function setMode(m){
    mode = m;
}

function resetAll(){
    busStart = null;
    busEnd = null;
    drops = [];
    document.querySelectorAll(".point,.line,.curve,.pin,.time").forEach(e=>e.remove());
}

document.getElementById("mapImg").addEventListener("click", function(e){
    const rect = this.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if(mode === "busStart"){
        busStart = {x,y};
        drawPoint(x,y,"bus");
    }
    else if(mode === "busEnd"){
        busEnd = {x,y};
        drawPoint(x,y,"bus");
    }
    else if(mode === "drop"){
        const drop = {x,y};
        drops.push(drop);
        drawPoint(x,y,"drop");

        if(busStart && busEnd){
            calcularRota(drop);
        }
    }
});

function drawPoint(x,y,type){
    const p = document.createElement("div");
    p.className = "point " + type;
    p.style.left = x+"px";
    p.style.top = y+"px";
    document.getElementById("mapa").appendChild(p);
}

function calcularRota(drop){

    // projeção na linha do ônibus
    const t = (
        (drop.x - busStart.x)*(busEnd.x - busStart.x) +
        (drop.y - busStart.y)*(busEnd.y - busStart.y)
    ) /
    (
        (busEnd.x - busStart.x)**2 +
        (busEnd.y - busStart.y)**2
    );

    const px = busStart.x + t*(busEnd.x - busStart.x);
    const py = busStart.y + t*(busEnd.y - busStart.y);

    // ponto de pulo (ajuste realista)
    const jumpX = px - (busEnd.x - busStart.x)*0.15;
    const jumpY = py - (busEnd.y - busStart.y)*0.15;

    drawCurve(jumpX, jumpY, drop.x, drop.y);

    calcularTempo(jumpX, jumpY, drop.x, drop.y);
}

function drawCurve(x1,y1,x2,y2){

    const cx = (x1 + x2)/2;
    const cy = (y1 + y2)/2 - 80;

    const path = document.createElement("div");
    path.className = "curve";
    path.style.left = (cx-100)+"px";
    path.style.top = (cy-100)+"px";
    path.style.width = "200px";
    path.style.height = "200px";

    document.getElementById("mapa").appendChild(path);
}

function calcularTempo(x1,y1,x2,y2){

    const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);

    const velocidadeQueda = 320;
    const velocidadeGlider = 130;

    const tempoQueda = dist / velocidadeQueda;
    const tempoGlider = dist / velocidadeGlider;

    const tempoAbrir = tempoQueda * 0.65;

    mostrarPin(x1,y1,tempoAbrir);
}

function mostrarPin(x,y,tempo){

    const pin = document.createElement("div");
    pin.className = "pin";
    pin.innerHTML = "🪂";
    pin.style.left = x+"px";
    pin.style.top = y+"px";

    const txt = document.createElement("div");
    txt.className = "time";
    txt.innerText = tempo.toFixed(1)+"s";
    txt.style.left = x+"px";
    txt.style.top = (y-25)+"px";

    document.getElementById("mapa").appendChild(pin);
    document.getElementById("mapa").appendChild(txt);
}
</script>

</body>
</html>
