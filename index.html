<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop PRO</title>

<style>
body{
  margin:0;
  background:#0b1d2a;
  font-family:Arial;
  color:white;
}

.topbar{
  position:fixed;
  top:10px;
  left:10px;
  z-index:10;
}

button{
  background:#2ecc71;
  border:none;
  padding:10px 15px;
  margin-right:5px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#27ae60;
}

canvas{
  display:block;
  margin:80px auto;
  border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="modo='start'">Início ônibus</button>
  <button onclick="modo='end'">Fim ônibus</button>
  <button onclick="modo='drop'">Drop</button>
  <button onclick="resetar()">Reset</button>
</div>

<canvas id="mapa" width="900" height="900"></canvas>

<script>
// ================= SETUP =================
const canvas = document.getElementById("mapa");
const ctx = canvas.getContext("2d");

const mapa = new Image();
mapa.src = "mapa.jpg"; // IMPORTANTE: nome correto do arquivo

let modo = null;

let start = null;
let end = null;
let drops = [];

let rotas = [];

// ================= CLICK =================
canvas.onclick = (e)=>{
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if(modo === "start") start = {x,y};
  if(modo === "end") end = {x,y};
  if(modo === "drop") drops.push({x,y});

  atualizarIA();
};

// ================= RESET =================
function resetar(){
  start = null;
  end = null;
  drops = [];
  rotas = [];
}

// ================= DRAW =================
function drawPoint(p, cor){
  if(!p) return;
  ctx.fillStyle = cor;
  ctx.beginPath();
  ctx.arc(p.x,p.y,6,0,Math.PI*2);
  ctx.fill();
}

function drawLinha(p1,p2,cor){
  if(!p1 || !p2) return;
  ctx.strokeStyle = cor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(p1.x,p1.y);
  ctx.lineTo(p2.x,p2.y);
  ctx.stroke();
}

// ================= SETA =================
function seta(p1,p2,cor){
  const ang = Math.atan2(p2.y-p1.y,p2.x-p1.x);
  const size = 10;

  ctx.fillStyle = cor;
  ctx.beginPath();
  ctx.moveTo(p2.x,p2.y);
  ctx.lineTo(p2.x - size*Math.cos(ang - Math.PI/6), p2.y - size*Math.sin(ang - Math.PI/6));
  ctx.lineTo(p2.x - size*Math.cos(ang + Math.PI/6), p2.y - size*Math.sin(ang + Math.PI/6));
  ctx.closePath();
  ctx.fill();
}

// ================= TEMPO =================
function calcularTempo(start, drop){

  const dist = Math.hypot(drop.x - start.x, drop.y - start.y);

  // ajuste fino aqui ↓
  const speedFall = 6.5;
  const speedGlide = 2.2;

  const fallPart = dist * 0.4;
  const glidePart = dist * 0.6;

  return (fallPart / speedFall) + (glidePart / speedGlide);
}

// ================= ROTA =================
function gerarRota(drop){

  const pontos = [];

  pontos.push(start);

  for(let i=1;i<=3;i++){
    pontos.push({
      x: start.x + (drop.x - start.x)*(i/4),
      y: start.y + (drop.y - start.y)*(i/4)
    });
  }

  pontos.push(drop);

  return pontos;
}

// ================= IA =================
function atualizarIA(){

  rotas = [];

  if(!start || drops.length === 0) return;

  drops.forEach((drop, index)=>{

    const tempo = calcularTempo(start, drop);

    rotas.push({
      pontos: gerarRota(drop),
      cor: index % 2 === 0 ? "cyan" : "yellow",
      tempo: tempo,
      drop: drop
    });

  });

  // melhor rota primeiro
  rotas.sort((a,b)=> a.tempo - b.tempo);
}

// ================= DESENHAR ROTAS =================
function drawRotas(){

  rotas.forEach((r,i)=>{

    ctx.strokeStyle = r.cor;
    ctx.lineWidth = i === 0 ? 4 : 2;

    ctx.beginPath();

    r.pontos.forEach((p,j)=>{
      if(j===0) ctx.moveTo(p.x,p.y);
      else ctx.lineTo(p.x,p.y);
    });

    ctx.stroke();

    // setas
    for(let k=0;k<r.pontos.length-1;k++){
      seta(r.pontos[k], r.pontos[k+1], r.cor);
    }

    // tempo
    ctx.fillStyle = "white";
    ctx.font = "12px Arial";
    ctx.fillText(r.tempo.toFixed(1)+"s", r.drop.x+5, r.drop.y-5);

  });
}

// ================= LOOP =================
function loop(){

  ctx.clearRect(0,0,900,900);
  ctx.drawImage(mapa,0,0,900,900);

  drawLinha(start,end,"white");

  drawRotas();

  drawPoint(start,"blue");
  drawPoint(end,"purple");

  drops.forEach(d=> drawPoint(d,"red"));

  requestAnimationFrame(loop);
}

mapa.onload = loop;
</script>

</body>
</html>
