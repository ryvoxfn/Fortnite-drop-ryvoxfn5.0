<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🎯 Drop Perfeito</title>

<style>
body{
    margin:0;
    background:#0b0f1a;
    font-family:Arial;
    text-align:center;
    color:white;
}

h1{
    margin:20px;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

canvas{
    margin-top:10px;
    border-radius:12px;
    max-width:90%;
    cursor:grab;
}
</style>
</head>

<body>

<h1>🎯 Drop Perfeito</h1>

<button onclick="modo='inicio'">Início ônibus</button>
<button onclick="modo='fim'">Fim ônibus</button>
<button onclick="modo='drop'">Drop</button>
<button onclick="reset()">Reset</button>

<br>
<canvas id="mapa" width="1000" height="1000"></canvas>

<script>
const canvas = document.getElementById("mapa");
const ctx = canvas.getContext("2d");

const mapa = new Image();
mapa.src = "https://media.fortniteapi.io/images/map.png?showPOI=true";

let modo = "";
let inicio = null;
let fim = null;
let drop = null;
let god = null;

// ZOOM + DRAG
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let dragging = false;
let lastX, lastY;

canvas.onmousedown = e=>{
    dragging = true;
    lastX = e.clientX;
    lastY = e.clientY;
};

canvas.onmouseup = ()=> dragging = false;

canvas.onmousemove = e=>{
    if(dragging){
        offsetX += e.clientX - lastX;
        offsetY += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        draw();
    }
};

canvas.onwheel = e=>{
    scale += e.deltaY * -0.001;
    scale = Math.min(Math.max(.5, scale), 3);
    draw();
};

canvas.onclick = e=>{
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left - offsetX) / scale;
    const y = (e.clientY - rect.top - offsetY) / scale;

    if(modo === "inicio") inicio = {x,y};
    if(modo === "fim") fim = {x,y};
    if(modo === "drop") drop = {x,y};

    if(inicio && fim && drop){
        calcularGod();
    }

    draw();
};

function calcularGod(){
    // projeção do drop na linha do ônibus
    const dx = fim.x - inicio.x;
    const dy = fim.y - inicio.y;

    const t = ((drop.x - inicio.x)*dx + (drop.y - inicio.y)*dy) / (dx*dx + dy*dy);

    const px = inicio.x + t * dx;
    const py = inicio.y + t * dy;

    // distância ideal (ajuste fino estilo pro)
    const distancia = 120;

    const len = Math.sqrt(dx*dx + dy*dy);

    god = {
        x: px - (dx/len) * distancia,
        y: py - (dy/len) * distancia
    };
}

function draw(){
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.setTransform(scale,0,0,scale,offsetX,offsetY);

    ctx.drawImage(mapa,0,0,1000,1000);

    // linha do ônibus
    if(inicio && fim){
        ctx.strokeStyle = "cyan";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(inicio.x,inicio.y);
        ctx.lineTo(fim.x,fim.y);
        ctx.stroke();
    }

    // linha GOD
    if(god && drop){
        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(god.x,god.y);
        ctx.lineTo(drop.x,drop.y);
        ctx.stroke();
    }

    drawPoint(inicio,"blue");
    drawPoint(fim,"blue");
    drawPoint(drop,"red");
    drawPoint(god,"yellow");
}

function drawPoint(p,color){
    if(!p) return;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,8,0,Math.PI*2);
    ctx.fill();
}

function reset(){
    inicio = fim = drop = god = null;
    draw();
}

mapa.onload = draw;
</script>

</body>
</html>
