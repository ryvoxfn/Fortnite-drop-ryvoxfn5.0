<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop PRO IA</title>

<style>
body {
  margin:0;
  background:#0b1a2a;
  font-family:Arial;
}

canvas {
  width:100vw;
  height:100vh;
  display:block;
}

.controls {
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:10px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.panel {
  position:fixed;
  bottom:10px;
  left:10px;
  background:#000a;
  padding:10px;
  border-radius:10px;
}

.hud {
  position:fixed;
  right:10px;
  top:10px;
  background:#000a;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="setMode('start')">Início ônibus</button>
  <button onclick="setMode('end')">Fim ônibus</button>
  <button onclick="setMode('drop')">Drop</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="panel">
Modo:
<select id="modeSelect">
  <option>FNCS</option>
  <option>Ranked</option>
  <option>Cash Cup</option>
  <option>Skin Cup</option>
</select>

<br><br>

Divisão:
<select id="divSelect">
  <option>Div 3</option>
  <option>Div 2</option>
  <option>Div 1</option>
</select>

<br><br>

Kills:
<input id="kills" type="number" value="5">

<br><br>

Placement:
<input id="placement" type="number" value="10">

<br><br>

<button onclick="toggleKill()">Kill ON/OFF</button>
<button onclick="calcPoints()">Calcular</button>
</div>

<div class="hud" id="hud">IA pronta</div>

<canvas id="map"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let img = new Image();
img.src = "mapa.jpg";

let mode = null;

let startBus=null,endBus=null,drop=null,dive=null;

let scale=1,offsetX=0,offsetY=0;
let dragging=false,lastX,lastY;

let killOn=true;

function setMode(m){mode=m;}

canvas.onmousedown=e=>{
  dragging=true;
  lastX=e.clientX;
  lastY=e.clientY;
};

canvas.onmouseup=()=>dragging=false;

canvas.onmousemove=e=>{
  if(dragging){
    offsetX+=e.clientX-lastX;
    offsetY+=e.clientY-lastY;
    lastX=e.clientX;
    lastY=e.clientY;
    draw();
  }
};

canvas.onwheel=e=>{
  scale+=e.deltaY*-0.001;
  scale=Math.max(0.5,Math.min(3,scale));
  draw();
};

canvas.onclick=e=>{
  let x=(e.clientX-offsetX)/scale;
  let y=(e.clientY-offsetY)/scale;

  if(mode==="start") startBus={x,y};
  if(mode==="end") endBus={x,y};
  if(mode==="drop") drop={x,y};

  calcIA();
  draw();
};

function calcIA(){
  if(!startBus||!endBus||!drop) return;

  let dist=Math.hypot(drop.x-startBus.x,drop.y-startBus.y);

  let glideDist=3000; // ajustado

  let ratio=glideDist/dist;

  dive={
    x: drop.x - (drop.x-startBus.x)*ratio,
    y: drop.y - (drop.y-startBus.y)*ratio
  };

  document.getElementById("hud").innerHTML="IA PRO 🔥";
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offsetX,offsetY);
  ctx.scale(scale,scale);

  ctx.drawImage(img,0,0,800,800);

  // linha ônibus LIMITADA
  if(startBus&&endBus){
    ctx.strokeStyle="white";
    ctx.beginPath();
    ctx.moveTo(startBus.x,startBus.y);
    ctx.lineTo(endBus.x,endBus.y);
    ctx.stroke();
  }

  drawPoint(startBus,"blue");
  drawPoint(endBus,"purple");
  drawPoint(drop,"red");

  // trajetória correta
  if(startBus&&drop){
    ctx.setLineDash([5,5]);
    ctx.strokeStyle="yellow";
    ctx.beginPath();
    ctx.moveTo(startBus.x,startBus.y);
    ctx.lineTo(drop.x,drop.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // ponto de afundar
  if(dive){
    drawPoint(dive,"yellow");

    ctx.strokeStyle="red";
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.moveTo(dive.x,dive.y);
    ctx.lineTo(drop.x,drop.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawPoint(p,c){
  if(!p)return;
  ctx.fillStyle=c;
  ctx.beginPath();
  ctx.arc(p.x,p.y,6,0,Math.PI*2);
  ctx.fill();
}

function resetAll(){
  startBus=endBus=drop=dive=null;
  draw();
}

// SISTEMA DE PONTOS
function toggleKill(){
  killOn=!killOn;
}

function calcPoints(){
  let kills=parseInt(document.getElementById("kills").value);
  let placement=parseInt(document.getElementById("placement").value);

  let points=0;

  if(killOn) points+=kills*3;
  points+=Math.max(0,100-placement);

  let meta=250;

  let partidas=Math.ceil(meta/points);

  document.getElementById("hud").innerHTML=
    `Pontos: ${points}<br>
     Precisa de: ${meta}<br>
     Partidas: ${partidas}`;
}

img.onload=draw;
</script>

</body>
</html>
