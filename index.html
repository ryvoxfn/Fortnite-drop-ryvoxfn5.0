<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop – PRO AI</title>

<style>
body {
  margin:0;
  background:#0b1a2f;
  font-family:Arial;
  overflow:hidden;
  color:white;
}

#topbar{
  position:absolute;
  top:10px;
  left:10px;
  z-index:10;
}

button{
  padding:10px;
  margin:3px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#hud{
  position:absolute;
  top:10px;
  right:10px;
  background:#000000cc;
  padding:10px;
  border-radius:10px;
  font-size:14px;
}

canvas{
  cursor:grab;
}
canvas:active{
  cursor:grabbing;
}
</style>
</head>

<body>

<div id="topbar">
  <button onclick="mode='start'">Início ônibus</button>
  <button onclick="mode='end'">Fim ônibus</button>
  <button onclick="mode='drop'">Drop</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="hud">Carregando...</div>

<canvas id="map"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ===== MAPA =====
const mapImg = new Image();

// 👉 tente local primeiro
mapImg.src = "mapa.jpg";

// 👉 fallback (se usar GitHub Pages, coloque seu link aqui)
mapImg.onerror = () => {
  mapImg.src = "https://ryvoxfn.github.io/Fortnite-drop-ryvoxfn5.0/mapa.jpg";
};

mapImg.onload = () => draw();

// ===== ESTADO =====
let mode = "";
let busStart=null, busEnd=null, drop=null;

let scale=1, offsetX=0, offsetY=0;
let dragging=false, lastX=0, lastY=0;

// ===== INTERAÇÃO =====
canvas.addEventListener("click",(e)=>{
  const x = (e.offsetX - offsetX)/scale;
  const y = (e.offsetY - offsetY)/scale;

  if(mode==="start") busStart={x,y};
  if(mode==="end") busEnd={x,y};
  if(mode==="drop") drop={x,y};
});

canvas.addEventListener("wheel",(e)=>{
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.max(0.5, Math.min(3, scale));
});

canvas.addEventListener("mousedown",(e)=>{
  dragging=true;
  lastX=e.offsetX;
  lastY=e.offsetY;
});
canvas.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("mousemove",(e)=>{
  if(dragging){
    offsetX += e.offsetX-lastX;
    offsetY += e.offsetY-lastY;
    lastX=e.offsetX;
    lastY=e.offsetY;
  }
});

function resetAll(){
  busStart=busEnd=drop=null;
}

// ===== UTILS =====
function dist(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y);
}
function normalize(v){
  let l=Math.hypot(v.x,v.y);
  return {x:v.x/l,y:v.y/l};
}

// ===== FÍSICA (APROX REALISTA) =====
const DIVE_SPEED = 160;
const GLIDE_SPEED = 70;
const GLIDE_TRIGGER_DIST = 300;

// simula trajetória curva (queda + glider)
function simulatePath(start, target){
  let pos={...start};
  let path=[{...pos}];

  let totalDist = dist(start,target);

  let diveDist = Math.max(0, totalDist - GLIDE_TRIGGER_DIST);

  let dir = normalize({x:target.x-pos.x,y:target.y-pos.y});

  // queda
  let steps = 40;
  for(let i=0;i<steps;i++){
    pos.x += dir.x*(diveDist/steps);
    pos.y += dir.y*(diveDist/steps);
    path.push({...pos});
  }

  // glider (mais lento)
  dir = normalize({x:target.x-pos.x,y:target.y-pos.y});
  for(let i=0;i<steps;i++){
    pos.x += dir.x*((totalDist-diveDist)/steps);
    pos.y += dir.y*((totalDist-diveDist)/steps);
    path.push({...pos});
  }

  return path;
}

// tempo baseado na distância
function calcTime(start,target){
  let d = dist(start,target);
  let dive = Math.max(0, d-GLIDE_TRIGGER_DIST)/DIVE_SPEED;
  let glide = Math.min(d,GLIDE_TRIGGER_DIST)/GLIDE_SPEED;
  return dive+glide;
}

// ===== IA MELHOR PULO =====
function findBestJump(){
  if(!busStart || !busEnd || !drop) return null;

  let best=null;

  for(let t=0;t<=1;t+=0.01){
    let pos={
      x:busStart.x+(busEnd.x-busStart.x)*t,
      y:busStart.y+(busEnd.y-busStart.y)*t
    };

    let time = calcTime(pos,drop);

    if(!best || time < best.time){
      best={pos,time};
    }
  }
  return best;
}

// ===== DESENHO =====
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offsetX,offsetY);
  ctx.scale(scale,scale);

  ctx.drawImage(mapImg,0,0,900,600);

  // linha ônibus com setas
  if(busStart && busEnd){
    ctx.strokeStyle="white";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(busStart.x,busStart.y);
    ctx.lineTo(busEnd.x,busEnd.y);
    ctx.stroke();

    let angle=Math.atan2(busEnd.y-busStart.y,busEnd.x-busStart.x);
    let d=dist(busStart,busEnd);

    for(let i=0;i<d;i+=25){
      let x=busStart.x+Math.cos(angle)*i;
      let y=busStart.y+Math.sin(angle)*i;

      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(angle);
      ctx.fillStyle="#ffffffcc";
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.lineTo(-10,-6);
      ctx.lineTo(-10,6);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // pontos
  function drawPoint(p,color){
    if(!p)return;
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.fill();
  }

  drawPoint(busStart,"blue");
  drawPoint(busEnd,"red");
  drawPoint(drop,"purple");

  // IA + trajetória
  let best = findBestJump();

  if(best){
    drawPoint(best.pos,"orange");

    let path = simulatePath(best.pos,drop);

    ctx.strokeStyle="yellow";
    ctx.beginPath();
    ctx.moveTo(path[0].x,path[0].y);
    path.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.stroke();

    document.getElementById("hud").innerHTML =
      "Tempo: "+best.time.toFixed(2)+"s<br>"+
      (best.time<3?"🔥 PERFECT":"⚠️ Ajustar");
  }

  ctx.restore();

  requestAnimationFrame(draw);
}
</script>

</body>
</html>
