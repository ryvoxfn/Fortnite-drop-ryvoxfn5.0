<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Drop Perfeito</title>

<style>
body{
    margin:0;
    background:#0b0f1a;
    font-family:Arial;
    color:white;
    text-align:center;
}

.controls{
    margin:10px;
}

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    background:#00ff88;
    font-weight:bold;
    cursor:pointer;
}

canvas{
    margin-top:10px;
    border-radius:12px;
}
</style>
</head>

<body>

<h2>🎯 Drop Perfeito</h2>

<div class="controls">
    <button onclick="modo='start'">Início ônibus</button>
    <button onclick="modo='end'">Fim ônibus</button>
    <button onclick="modo='drop'">Drop</button>
    <button onclick="reset()">Reset</button>
</div>

<canvas id="mapa" width="900" height="900"></canvas>

<script>
const canvas = document.getElementById("mapa");
const ctx = canvas.getContext("2d");

const mapa = new Image();
mapa.src = "mapa.jpg";

let modo = "start";

let start = null;
let end = null;
let drop = null;

// clique
canvas.onclick = (e)=>{
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left)*(canvas.width/rect.width);
    const y = (e.clientY - rect.top)*(canvas.height/rect.height);

    if(modo==="start") start = {x,y};
    if(modo==="end") end = {x,y};
    if(modo==="drop") drop = {x,y};

    desenhar();
};

function reset(){
    start = end = drop = null;
    desenhar();
}

// cálculo simples (igual copilot)
function calcularAfundar(){
    if(!start || !end || !drop) return null;

    const dx = end.x - start.x;
    const dy = end.y - start.y;

    const len = Math.hypot(dx,dy);

    const nx = dx/len;
    const ny = dy/len;

    const DISTANCIA = 280; // ajuste fino

    return {
        x: drop.x - nx*DISTANCIA,
        y: drop.y - ny*DISTANCIA
    };
}

// desenhar
function desenhar(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(mapa,0,0,canvas.width,canvas.height);

    // linha ônibus
    if(start && end){
        ctx.strokeStyle="#00ffff";
        ctx.lineWidth=2;
        ctx.beginPath();
        ctx.moveTo(start.x,start.y);
        ctx.lineTo(end.x,end.y);
        ctx.stroke();
    }

    const af = calcularAfundar();

    if(af && drop){

        // linha principal
        ctx.strokeStyle="yellow";
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.moveTo(af.x,af.y);
        ctx.lineTo(drop.x,drop.y);
        ctx.stroke();

        // ponto afundar
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(af.x,af.y,8,0,Math.PI*2);
        ctx.fill();
    }

    // drop
    if(drop){
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(drop.x,drop.y,7,0,Math.PI*2);
        ctx.fill();
    }

    // ônibus pontos
    if(start){
        ctx.fillStyle="#00ffff";
        ctx.beginPath();
        ctx.arc(start.x,start.y,6,0,Math.PI*2);
        ctx.fill();
    }

    if(end){
        ctx.fillStyle="#00ffff";
        ctx.beginPath();
        ctx.arc(end.x,end.y,6,0,Math.PI*2);
        ctx.fill();
    }
}

mapa.onload = desenhar;
</script>

</body>
</html>
