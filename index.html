<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop PRO</title>

<style>
body {
    margin: 0;
    background: #0b1a2f;
    font-family: Arial;
    color: white;
    text-align: center;
}

#topbar {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

button {
    padding: 10px;
    margin: 3px;
    border-radius: 8px;
    border: none;
    background: #00c853;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

canvas {
    margin-top: 60px;
    border: 2px solid #000;
}
#hud {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #000000aa;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="setBusStart()">Início ônibus</button>
    <button onclick="setBusEnd()">Fim ônibus</button>
    <button onclick="setDrop()">Drop</button>
    <button onclick="resetAll()">Reset</button>
</div>

<div id="hud">
    Tempo: <span id="tempo">0</span>s<br>
    Distância: <span id="dist">0</span>px<br>
    IA: <span id="ia">-</span>
</div>

<canvas id="map" width="900" height="900"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

const mapa = new Image();
mapa.src = "mapa.jpg"; // IMPORTANTE: mesmo nome do seu arquivo

let busStart = null;
let busEnd = null;
let drop = null;

let mode = "";

canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    if (mode === "start") busStart = {x,y};
    if (mode === "end") busEnd = {x,y};
    if (mode === "drop") drop = {x,y};

    draw();
});

function setBusStart(){ mode="start"; }
function setBusEnd(){ mode="end"; }
function setDrop(){ mode="drop"; }

function resetAll(){
    busStart = null;
    busEnd = null;
    drop = null;
    document.getElementById("tempo").innerText = "0";
    document.getElementById("dist").innerText = "0";
    document.getElementById("ia").innerText = "-";
    draw();
}

// ====== FÍSICA MAIS REALISTA ======
function calcularTempo(dist){
    let queda = 14; // tempo queda livre
    let glide = 20; // tempo glider
    let total = queda + glide;

    // ajuste baseado na distância horizontal
    total += dist / 300;

    return total.toFixed(1);
}

// ===== IA MELHOR DROP =====
function calcularMelhorDrop(){
    if(!busStart || !busEnd) return;

    let melhor = null;
    let melhorScore = 999999;

    for(let i=0;i<=1;i+=0.01){
        let x = busStart.x + (busEnd.x - busStart.x)*i;
        let y = busStart.y + (busEnd.y - busStart.y)*i;

        let dist = Math.hypot(drop.x - x, drop.y - y);

        let tempo = 14 + 20 + dist/300;

        if(tempo < melhorScore){
            melhorScore = tempo;
            melhor = {x,y};
        }
    }

    return melhor;
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(mapa,0,0,canvas.width,canvas.height);

    // linha ônibus
    if(busStart && busEnd){
        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(busStart.x, busStart.y);
        ctx.lineTo(busEnd.x, busEnd.y);
        ctx.stroke();

        // direção (setinhas)
        for(let i=0;i<=1;i+=0.05){
            let x = busStart.x + (busEnd.x - busStart.x)*i;
            let y = busStart.y + (busEnd.y - busStart.y)*i;

            ctx.fillStyle = "white";
            ctx.fillRect(x,y,3,3);
        }
    }

    // pontos
    if(busStart){
        ctx.fillStyle="blue";
        ctx.beginPath();
        ctx.arc(busStart.x,busStart.y,6,0,Math.PI*2);
        ctx.fill();
    }

    if(busEnd){
        ctx.fillStyle="red";
        ctx.beginPath();
        ctx.arc(busEnd.x,busEnd.y,6,0,Math.PI*2);
        ctx.fill();
    }

    if(drop){
        ctx.fillStyle="lime";
        ctx.beginPath();
        ctx.arc(drop.x,drop.y,6,0,Math.PI*2);
        ctx.fill();
    }

    // ===== IA =====
    if(busStart && busEnd && drop){
        let melhor = calcularMelhorDrop();

        ctx.fillStyle="orange";
        ctx.beginPath();
        ctx.arc(melhor.x,melhor.y,8,0,Math.PI*2);
        ctx.fill();

        // linha até o drop
        ctx.strokeStyle="white";
        ctx.beginPath();
        ctx.moveTo(melhor.x, melhor.y);
        ctx.lineTo(drop.x, drop.y);
        ctx.stroke();

        let dist = Math.hypot(drop.x - melhor.x, drop.y - melhor.y);

        document.getElementById("tempo").innerText = calcularTempo(dist);
        document.getElementById("dist").innerText = Math.floor(dist);
        document.getElementById("ia").innerText = "ATIVA";
    }
}

mapa.onload = draw;
</script>

</body>
</html>
