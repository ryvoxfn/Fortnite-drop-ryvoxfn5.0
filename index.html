<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop IA PRO</title>

<style>
body {
  margin:0;
  background:#0b1a2a;
  font-family:Arial;
}

#map {
  width:100vw;
  height:100vh;
  cursor:grab;
}

.controls {
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:10px;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.hud {
  position:fixed;
  right:10px;
  top:10px;
  background:#000a;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="setMode('start')">Início ônibus</button>
  <button onclick="setMode('end')">Fim ônibus</button>
  <button onclick="setMode('drop')">Drop</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="hud" id="hud">
Tempo: -<br>
Precisão: -
</div>

<canvas id="map"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let img = new Image();
img.src = "mapa.jpg"; // IMPORTANTE: mesmo nome do seu arquivo

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let scale = 1;
let offsetX = 0;
let offsetY = 0;

let dragging = false;
let lastX, lastY;

let mode = null;

let startBus = null;
let endBus = null;
let drop = null;
let divePoint = null;

img.onload = () => draw();

function setMode(m){
  mode = m;
}

canvas.addEventListener("mousedown", e=>{
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

canvas.addEventListener("mouseup", ()=>{
  dragging = false;
});

canvas.addEventListener("mousemove", e=>{
  if(dragging){
    offsetX += e.clientX - lastX;
    offsetY += e.clientY - lastY;
    lastX = e.clientX;
    lastY = e.clientY;
    draw();
  }
});

canvas.addEventListener("wheel", e=>{
  scale += e.deltaY * -0.001;
  scale = Math.max(0.5, Math.min(3, scale));
  draw();
});

canvas.addEventListener("click", e=>{
  let x = (e.clientX - offsetX) / scale;
  let y = (e.clientY - offsetY) / scale;

  if(mode === "start") startBus = {x,y};
  if(mode === "end") endBus = {x,y};
  if(mode === "drop") drop = {x,y};

  calculateIA();
  draw();
});

function distance(a,b){
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function calculateIA(){
  if(!startBus || !endBus || !drop) return;

  // direção do ônibus
  let dx = endBus.x - startBus.x;
  let dy = endBus.y - startBus.y;

  let length = Math.hypot(dx,dy);
  let dir = {x:dx/length, y:dy/length};

  // distância total até o drop
  let dist = distance(startBus, drop);

  // parâmetros reais (baseados no que você falou)
  let fallSpeed = 300;   // queda rápida
  let glideSpeed = 150;  // glider

  let fallTime = 14;
  let glideTime = 20;

  let fallDist = fallSpeed * fallTime;
  let glideDist = glideSpeed * glideTime;

  // ponto ideal de abrir glider
  let totalNeeded = glideDist;

  let ratio = totalNeeded / dist;

  divePoint = {
    x: drop.x - (drop.x - startBus.x) * ratio,
    y: drop.y - (drop.y - startBus.y) * ratio
  };

  document.getElementById("hud").innerHTML =
    "IA Ativa 🔥<br>Ponto de afundar calculado";
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  ctx.drawImage(img,0,0,800,800);

  // linha ônibus
  if(startBus && endBus){
    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(startBus.x, startBus.y);
    ctx.lineTo(endBus.x, endBus.y);
    ctx.stroke();
  }

  drawPoint(startBus,"blue");
  drawPoint(endBus,"purple");
  drawPoint(drop,"red");

  // trajetória
  if(startBus && drop){
    ctx.setLineDash([10,5]);
    ctx.strokeStyle = "yellow";
    ctx.beginPath();
    ctx.moveTo(startBus.x,startBus.y);
    ctx.lineTo(drop.x,drop.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 🔥 ponto de afundar
  if(divePoint){
    drawPoint(divePoint,"yellow");

    ctx.strokeStyle = "red";
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.moveTo(divePoint.x, divePoint.y);
    ctx.lineTo(drop.x, drop.y);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.restore();
}

function drawPoint(p,color){
  if(!p) return;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(p.x,p.y,6,0,Math.PI*2);
  ctx.fill();
}

function resetAll(){
  startBus = null;
  endBus = null;
  drop = null;
  divePoint = null;
  draw();
}
</script>

</body>
</html>
