<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop PRO</title>

<style>
body{
  margin:0;
  background:#061826;
  font-family:Arial;
}

/* BOTÕES */
.controls{
  position:absolute;
  top:20px;
  left:20px;
  z-index:10;
}

button{
  background:#22c55e;
  border:none;
  padding:10px;
  margin-right:5px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* MAPA */
.map-container{
  position:relative;
  width:900px;
  margin:60px auto;
}

#map{
  width:100%;
  display:block;
}

#canvas{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  cursor:crosshair;
}
</style>
</head>

<body>

<div class="controls">
  <button onclick="setStart()">Início ônibus</button>
  <button onclick="setEnd()">Fim ônibus</button>
  <button onclick="setDrop()">Drop</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div class="map-container">
  <img id="map" src="mapa.jpg">
  <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const map = document.getElementById("map");

let start=null;
let end=null;
let drop=null;
let clickMode="";

// 🔥 GARANTE TAMANHO CORRETO
map.onload = () => {
  canvas.width = map.clientWidth;
  canvas.height = map.clientHeight;
};

// CLIQUE CORRETO
canvas.addEventListener("click", (e)=>{
  const rect = canvas.getBoundingClientRect();

  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;

  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  if(clickMode==="start") start={x,y};
  if(clickMode==="end") end={x,y};
  if(clickMode==="drop") drop={x,y};

  draw();
});

// BOTÕES
function setStart(){clickMode="start";}
function setEnd(){clickMode="end";}
function setDrop(){clickMode="drop";}

function resetAll(){
  start=end=drop=null;
  draw();
}

// DESENHO
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(start) drawPoint(start,"blue");
  if(end) drawPoint(end,"purple");
  if(drop) drawPoint(drop,"red");

  // linha ônibus
  if(start && end){
    ctx.strokeStyle="white";
    ctx.lineWidth=2;

    ctx.beginPath();
    ctx.moveTo(start.x,start.y);
    ctx.lineTo(end.x,end.y);
    ctx.stroke();
  }

  // IA ponto perfeito
  if(start && end && drop){

    const t = calcBest();

    const px = start.x + (end.x-start.x)*t;
    const py = start.y + (end.y-start.y)*t;

    drawPoint({x:px,y:py},"yellow");

    ctx.setLineDash([6,6]);
    ctx.strokeStyle="red";

    ctx.beginPath();
    ctx.moveTo(px,py);
    ctx.lineTo(drop.x,drop.y);
    ctx.stroke();

    ctx.setLineDash([]);
  }
}

// desenhar ponto
function drawPoint(p,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(p.x,p.y,6,0,Math.PI*2);
  ctx.fill();
}

// IA simples
function calcBest(){
  const dx = drop.x - start.x;
  const dy = drop.y - start.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if(dist > 600) return 0.7;
  if(dist > 400) return 0.6;
  if(dist > 250) return 0.5;
  return 0.4;
}
</script>

</body>
</html>
