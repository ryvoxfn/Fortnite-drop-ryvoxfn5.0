<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop IA PRO</title>

<style>
body {
  margin: 0;
  background: #0b1a2a;
  color: white;
  font-family: Arial;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  background: #00c853;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

#hud {
  position: absolute;
  right: 10px;
  top: 10px;
  background: black;
  padding: 10px;
  border-radius: 8px;
}

canvas {
  cursor: grab;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="setMode('start')">Início ônibus</button>
  <button onclick="setMode('end')">Fim ônibus</button>
  <button onclick="setMode('drop')">Drop</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="hud">HUD</div>

<canvas id="map" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let mapImg = new Image();
mapImg.src = "mapa.jpg"; // 🔥 CONFERE ISSO

let mode = "start";

let busStart = null;
let busEnd = null;
let drop = null;

let offsetX = 0;
let offsetY = 0;
let scale = 1;
let dragging = false;
let lastX, lastY;

// 🔥 ZOOM
canvas.addEventListener("wheel", e => {
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.max(0.5, Math.min(3, scale));
});

// 🔥 DRAG
canvas.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.offsetX;
  lastY = e.offsetY;
});

canvas.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("mousemove", e => {
  if (dragging) {
    offsetX += e.offsetX - lastX;
    offsetY += e.offsetY - lastY;
    lastX = e.offsetX;
    lastY = e.offsetY;
  }
});

// 🔥 CLICK
canvas.addEventListener("click", e => {
  const x = (e.offsetX - offsetX) / scale;
  const y = (e.offsetY - offsetY) / scale;

  if (mode === "start") busStart = { x, y };
  if (mode === "end") busEnd = { x, y };
  if (mode === "drop") drop = { x, y };
});

function setMode(m){ mode = m; }
function resetAll(){
  busStart = busEnd = drop = null;
}

// 🧠 FUNÇÕES
function distance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

function normalize(v){
  const len = Math.hypot(v.x,v.y);
  return { x: v.x/len, y: v.y/len };
}

// 🧠 IA SIMULAÇÃO
function simulateDrop(jumpPoint, dropPoint) {
  const diveTime = 14;
  const glideTime = 20;

  const diveSpeed = 120;
  const glideSpeed = 60;

  let pos = { ...jumpPoint };
  let dir = normalize({
    x: dropPoint.x - pos.x,
    y: dropPoint.y - pos.y
  });

  let time = 0;

  for (let t=0; t<diveTime; t+=0.1){
    pos.x += dir.x * diveSpeed * 0.1;
    pos.y += dir.y * diveSpeed * 0.1;
    time += 0.1;
  }

  dir = normalize({
    x: dropPoint.x - pos.x,
    y: dropPoint.y - pos.y
  });

  for (let t=0; t<glideTime; t+=0.1){
    pos.x += dir.x * glideSpeed * 0.1;
    pos.y += dir.y * glideSpeed * 0.1;
    time += 0.1;
  }

  return {
    time,
    dist: distance(pos, dropPoint),
    final: pos
  };
}

// 🧠 IA MELHOR PULO
function findBestJump(){
  if (!busStart || !busEnd || !drop) return null;

  let best = null;

  for (let t=0; t<=30; t+=0.3){
    const p = t/30;

    const busPos = {
      x: busStart.x + (busEnd.x - busStart.x)*p,
      y: busStart.y + (busEnd.y - busStart.y)*p
    };

    const sim = simulateDrop(busPos, drop);

    const score = sim.dist + sim.time*2;

    if (!best || score < best.score){
      best = { jump: busPos, sim, score };
    }
  }

  return best;
}

// 🎯 DESENHO
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  ctx.drawImage(mapImg, 0, 0, 900, 600);

  if (busStart){
    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(busStart.x,busStart.y,6,0,Math.PI*2);
    ctx.fill();
  }

  if (busEnd){
    ctx.fillStyle="red";
    ctx.beginPath();
    ctx.arc(busEnd.x,busEnd.y,6,0,Math.PI*2);
    ctx.fill();
  }

  if (drop){
    ctx.fillStyle="purple";
    ctx.beginPath();
    ctx.arc(drop.x,drop.y,6,0,Math.PI*2);
    ctx.fill();
  }

  const result = findBestJump();

  if (result){
    const j = result.jump;

    ctx.fillStyle="orange";
    ctx.beginPath();
    ctx.arc(j.x,j.y,8,0,Math.PI*2);
    ctx.fill();

    ctx.strokeStyle="yellow";
    ctx.beginPath();
    ctx.moveTo(j.x,j.y);
    ctx.lineTo(drop.x,drop.y);
    ctx.stroke();

    updateHUD(result.sim);
  }

  ctx.restore();

  requestAnimationFrame(draw);
}

// 🧠 HUD
function updateHUD(sim){
  document.getElementById("hud").innerHTML =
    "Tempo: " + sim.time.toFixed(1) + "s<br>" +
    "Erro: " + sim.dist.toFixed(0) + "px<br>" +
    (sim.dist < 50 ? "🔥 PERFECT DROP" : "⚠️ Ajustar");
}

mapImg.onload = draw;
</script>

</body>
</html>
