<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop IA PRO</title>

<style>
body {
  margin: 0;
  background: #0b1a2a;
  font-family: Arial;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
}

button {
  margin: 3px;
  padding: 8px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

#hud {
  position: absolute;
  right: 10px;
  top: 10px;
  background: rgba(0,0,0,0.8);
  padding: 10px;
  border-radius: 8px;
  color: white;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="mode='start'">Início ônibus</button>
  <button onclick="mode='end'">Fim ônibus</button>
  <button onclick="mode='drop'">Drop</button>
  <button onclick="resetAll()">Reset</button>
</div>

<div id="hud">Carregando mapa...</div>

<canvas id="map" width="900" height="600"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let mapImg = new Image();

// 🔥 LINK ABSOLUTO (CORRIGIDO)
mapImg.src = "https://ryvoxfn.github.io/Fortnite-drop-ryvoxfn5.0/mapa.jpg";

let mode = "start";
let busStart = null;
let busEnd = null;
let drop = null;

// zoom / drag
let offsetX = 0, offsetY = 0, scale = 1;
let dragging = false, lastX, lastY;

// 🧠 FUNÇÕES BASE
function distance(a,b){
  return Math.hypot(a.x-b.x, a.y-b.y);
}

function normalize(v){
  const len = Math.hypot(v.x,v.y);
  return { x:v.x/len, y:v.y/len };
}

// 🧠 IA SIMULAÇÃO
function simulateDrop(jump, target){
  const diveTime = 14;
  const glideTime = 20;

  const diveSpeed = 120;
  const glideSpeed = 60;

  let pos = { ...jump };
  let time = 0;

  let dir = normalize({
    x: target.x - pos.x,
    y: target.y - pos.y
  });

  for (let t=0;t<diveTime;t+=0.1){
    pos.x += dir.x * diveSpeed * 0.1;
    pos.y += dir.y * diveSpeed * 0.1;
    time += 0.1;
  }

  dir = normalize({
    x: target.x - pos.x,
    y: target.y - pos.y
  });

  for (let t=0;t<glideTime;t+=0.1){
    pos.x += dir.x * glideSpeed * 0.1;
    pos.y += dir.y * glideSpeed * 0.1;
    time += 0.1;
  }

  return {
    time,
    dist: distance(pos,target)
  };
}

// 🧠 IA MELHOR PULO
function findBestJump(){
  if(!busStart || !busEnd || !drop) return null;

  let best = null;

  for(let t=0;t<=30;t+=0.3){
    let p = t/30;

    let busPos = {
      x: busStart.x + (busEnd.x - busStart.x)*p,
      y: busStart.y + (busEnd.y - busStart.y)*p
    };

    let sim = simulateDrop(busPos, drop);
    let score = sim.dist + sim.time*2;

    if(!best || score < best.score){
      best = { jump: busPos, sim, score };
    }
  }

  return best;
}

// 🎯 CONTROLES
canvas.addEventListener("click", e=>{
  const x = (e.offsetX - offsetX) / scale;
  const y = (e.offsetY - offsetY) / scale;

  if(mode==="start") busStart={x,y};
  if(mode==="end") busEnd={x,y};
  if(mode==="drop") drop={x,y};
});

canvas.addEventListener("wheel", e=>{
  e.preventDefault();
  scale += e.deltaY * -0.001;
  scale = Math.max(0.5, Math.min(3, scale));
});

canvas.addEventListener("mousedown", e=>{
  dragging=true;
  lastX=e.offsetX;
  lastY=e.offsetY;
});

canvas.addEventListener("mouseup", ()=>dragging=false);

canvas.addEventListener("mousemove", e=>{
  if(dragging){
    offsetX += e.offsetX-lastX;
    offsetY += e.offsetY-lastY;
    lastX=e.offsetX;
    lastY=e.offsetY;
  }
});

function resetAll(){
  busStart = busEnd = drop = null;
}

// 🎨 DESENHO
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // MAPA
  ctx.drawImage(mapImg, 0, 0, 900, 600);

  function drawPoint(p,color){
    if(!p) return;
    ctx.fillStyle=color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,6,0,Math.PI*2);
    ctx.fill();
  }

  drawPoint(busStart,"blue");
  drawPoint(busEnd,"red");
  drawPoint(drop,"purple");

  const best = findBestJump();

  if(best){
    const j = best.jump;

    drawPoint(j,"orange");

    ctx.strokeStyle="yellow";
    ctx.beginPath();
    ctx.moveTo(j.x,j.y);
    ctx.lineTo(drop.x,drop.y);
    ctx.stroke();

    // HUD
    document.getElementById("hud").innerHTML =
      "Tempo: "+best.sim.time.toFixed(1)+"s<br>"+
      "Erro: "+best.sim.dist.toFixed(0)+"px<br>"+
      (best.sim.dist<50?"🔥 PERFECT":"⚠️ Ajustar");
  }

  ctx.restore();

  requestAnimationFrame(draw);
}

// 🔥 GARANTE QUE O MAPA CARREGOU
mapImg.onload = () => {
  document.getElementById("hud").innerText = "Mapa carregado ✔";
  draw();
};

mapImg.onerror = () => {
  document.getElementById("hud").innerText = "ERRO ao carregar mapa ❌";
};
</script>

</body>
</html>
