<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FNCS DROP PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f1a;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.controls {
    margin: 20px;
}

button {
    background: #00ff88;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #00cc6a;
}

canvas {
    border-radius: 15px;
    margin-bottom: 20px;
    max-width: 95%;
}
</style>
</head>

<body>

<h1>🎯 FNCS DROP PRO</h1>

<div class="controls">
    <button onclick="modo='start'">Início ônibus</button>
    <button onclick="modo='end'">Fim ônibus</button>
    <button onclick="modo='drop'">Drop</button>
    <button onclick="reset()">Reset</button>
</div>

<canvas id="mapa" width="900" height="900"></canvas>

<script>
const canvas = document.getElementById("mapa");
const ctx = canvas.getContext("2d");

const mapa = new Image();
mapa.src = "mapa.jpg"; // coloque sua imagem aqui

let modo = "start";

let busStart = null;
let busEnd = null;
let drop = null;

// clique no mapa
canvas.addEventListener("click", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (modo === "start") busStart = { x, y };
    if (modo === "end") busEnd = { x, y };
    if (modo === "drop") drop = { x, y };

    desenhar();
});

// reset
function reset() {
    busStart = null;
    busEnd = null;
    drop = null;
    desenhar();
}

// cálculo PRO (com ajuste lateral realista)
function calcularDropPro(busStart, busEnd, drop) {
    const dx = busEnd.x - busStart.x;
    const dy = busEnd.y - busStart.y;

    const length = Math.sqrt(dx * dx + dy * dy);

    const nx = dx / length;
    const ny = dy / length;

    // perpendicular (simula drift do glider)
    const px = -ny;
    const py = nx;

    const DISTANCIA_BASE = 280;
    const AJUSTE_LATERAL = 60;

    const afundarX = drop.x - nx * DISTANCIA_BASE + px * AJUSTE_LATERAL;
    const afundarY = drop.y - ny * DISTANCIA_BASE + py * AJUSTE_LATERAL;

    const distancia = Math.sqrt(
        (drop.x - afundarX) ** 2 +
        (drop.y - afundarY) ** 2
    );

    const tempo = (distancia / 120).toFixed(1);

    return {
        afundar: { x: afundarX, y: afundarY },
        tempo: tempo
    };
}

// desenhar setas do ônibus
function desenharSeta(x, y, dx, dy) {
    const angle = Math.atan2(dy, dx);

    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.fillStyle = "white";

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-8, -4);
    ctx.lineTo(-8, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

// desenhar tudo
function desenhar() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(mapa, 0, 0, canvas.width, canvas.height);

    // direção do ônibus (com setas)
    if (busStart && busEnd) {
        const dx = busEnd.x - busStart.x;
        const dy = busEnd.y - busStart.y;

        const steps = 25;

        for (let i = 0; i < steps; i++) {
            const t = i / steps;

            const x = busStart.x + dx * t;
            const y = busStart.y + dy * t;

            desenharSeta(x, y, dx, dy);
        }
    }

    // cálculo drop
    if (busStart && busEnd && drop) {
        const calc = calcularDropPro(busStart, busEnd, drop);
        const afundar = calc.afundar;

        // linha amarela
        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(afundar.x, afundar.y);
        ctx.lineTo(drop.x, drop.y);
        ctx.stroke();

        // ponto de afundar (principal)
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.arc(afundar.x, afundar.y, 8, 0, Math.PI * 2);
        ctx.fill();

        // ponto final (drop)
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(drop.x, drop.y, 8, 0, Math.PI * 2);
        ctx.fill();

        // tempo do glider
        ctx.fillStyle = "white";
        ctx.font = "bold 14px Arial";
        ctx.fillText(calc.tempo + "s", afundar.x + 10, afundar.y - 10);
    }

    // pontos do ônibus
    if (busStart) {
        ctx.fillStyle = "#00ffff";
        ctx.beginPath();
        ctx.arc(busStart.x, busStart.y, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    if (busEnd) {
        ctx.fillStyle = "#00ffff";
        ctx.beginPath();
        ctx.arc(busEnd.x, busEnd.y, 6, 0, Math.PI * 2);
        ctx.fill();
    }
}

mapa.onload = desenhar;
</script>

</body>
</html>
