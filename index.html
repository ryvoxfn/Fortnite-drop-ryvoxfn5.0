<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNCS Drop PRO</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* HUD */
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    z-index: 2;
}

/* CANVAS */
canvas {
    display: block;
}

/* BOTÕES */
#controls {
    position: absolute;
    top: 70px;
    left: 20px;
    z-index: 2;
}

#controls button {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #22c55e;
    color: white;
    cursor: pointer;
}

/* PAINEL */
#painel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 260px;
    padding: 15px;
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    z-index: 2;
}

#painel input {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

/* TOGGLE */
.toggle {
    width: 100%;
    height: 40px;
    border-radius: 50px;
    background: red;
    display: flex;
    align-items: center;
    padding: 5px;
    position: relative;
    cursor: pointer;
}

.toggle .circle {
    width: 30px;
    height: 30px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
}

.toggle span {
    position: absolute;
    right: 15px;
}

.toggle.on {
    background: #22c55e;
}

.toggle.on .circle {
    transform: translateX(120px);
}
.toggle.on span {
    left: 15px;
    right: auto;
}

/* PROGRESS */
.progress {
    width: 100%;
    height: 10px;
    background: #1f2937;
    border-radius: 10px;
    margin-top: 10px;
}

#bar {
    height: 100%;
    width: 0%;
    background: #22c55e;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- HUD -->
<div id="hud">
    <div>🔥 FNCS PRO</div>
    <div id="info">Precisão: -</div>
</div>

<!-- BOTÕES -->
<div id="controls">
    <button onclick="setInicio()">Início ônibus</button>
    <button onclick="setFim()">Fim ônibus</button>
    <button onclick="setDrop()">Drop</button>
    <button onclick="reset()">Reset</button>
</div>

<!-- PAINEL -->
<div id="painel">
    <input id="kills" placeholder="Kills">
    <input id="placement" placeholder="Placement">

    <div class="toggle" id="toggle" onclick="toggleKill()">
        <div class="circle"></div>
        <span id="label">OFF</span>
    </div>

    <button onclick="calcular()">Calcular</button>

    <div id="resultado"></div>

    <div class="progress">
        <div id="bar"></div>
    </div>

    <div id="previsao"></div>
</div>

<!-- MAPA -->
<canvas id="canvas"></canvas>

<script>
// ==========================
// CONFIG CANVAS
// ==========================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// ==========================
// IMAGEM DO MAPA
// ==========================
let img = new Image();
img.src = "mapa.jpg"; // PRECISA estar na mesma pasta

img.onload = () => draw();

// ==========================
// VARIÁVEIS
// ==========================
let inicio = null;
let fim = null;
let drop = null;
let modo = "";

// ==========================
// CLICK NO MAPA
// ==========================
canvas.onclick = (e) => {
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    if (modo === "inicio") inicio = {x,y};
    else if (modo === "fim") fim = {x,y};
    else if (modo === "drop") drop = {x,y};

    draw();
};

// ==========================
// DESENHAR
// ==========================
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    // Linha ônibus
    if (inicio && fim) {
        ctx.strokeStyle = "yellow";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(inicio.x, inicio.y);
        ctx.lineTo(fim.x, fim.y);
        ctx.stroke();
    }

    // Drop
    if (drop) {
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(drop.x, drop.y, 8, 0, Math.PI*2);
        ctx.fill();
    }
}

// ==========================
// BOTÕES
// ==========================
function setInicio(){ modo = "inicio"; }
function setFim(){ modo = "fim"; }
function setDrop(){ modo = "drop"; }

function reset(){
    inicio = fim = drop = null;
    draw();
}

// ==========================
// TOGGLE
// ==========================
let killAtivado = false;

function toggleKill(){
    let t = document.getElementById("toggle");
    let label = document.getElementById("label");

    killAtivado = !killAtivado;

    if(killAtivado){
        t.classList.add("on");
        label.innerText = "ON";
    } else {
        t.classList.remove("on");
        label.innerText = "OFF";
    }
}

// ==========================
// FNCS
// ==========================
function placementPoints(p){
    if(p==1) return 65;
    if(p<=5) return 50;
    if(p<=10) return 40;
    if(p<=20) return 30;
    if(p<=30) return 20;
    return 0;
}

// ==========================
// CALCULAR
// ==========================
function calcular(){
    let k = parseInt(document.getElementById("kills").value)||0;
    let p = parseInt(document.getElementById("placement").value)||100;

    let pts = placementPoints(p) + (killAtivado ? k*2 : 0);

    document.getElementById("resultado").innerHTML =
        "Pontos: " + pts;

    let meta = 300;
    let perc = (pts/meta)*100;

    document.getElementById("bar").style.width = perc + "%";

    let partidas = Math.ceil(meta/(pts||1));

    document.getElementById("previsao").innerHTML =
        "Partidas necessárias: " + partidas;
}
</script>

</body>
</html>
