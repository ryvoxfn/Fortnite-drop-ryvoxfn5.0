<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fortnite Drop PRO IA</title>

<style>
body {
    margin:0;
    background:#0b1a2a;
    font-family:Arial;
    overflow:hidden;
}

#topbar {
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
}

button {
    background:#22c55e;
    border:none;
    padding:8px 12px;
    margin:3px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

#hud {
    position:absolute;
    top:10px;
    right:10px;
    background:#000a;
    padding:10px;
    border-radius:10px;
    color:white;
}

canvas {
    cursor:grab;
}
canvas:active {
    cursor:grabbing;
}
</style>
</head>

<body>

<div id="topbar">
    <button onclick="setPonto('busStart')">Início ônibus</button>
    <button onclick="setPonto('busEnd')">Fim ônibus</button>
    <button onclick="setPonto('drop')">🟠 Salte aqui</button>
    <button onclick="setPonto('glider')">🟢 Abrir glider</button>
    <button onclick="autoDrop()">🤖 Melhor Drop</button>
    <button onclick="resetar()">Reset</button>
</div>

<div id="hud">HUD</div>

<canvas id="map"></canvas>

<script>
const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let img = new Image();
img.src = "mapa.jpg";

// zoom / movimento
let escala = 1;
let offsetX = 0;
let offsetY = 0;

let dragging = false;
let lastX, lastY;

// modo clique
let modo = null;

let pontos = {
    busStart:null,
    busEnd:null,
    drop:null,
    glider:null
};

// ======================
// 🔥 FÍSICA
// ======================

const GRAVIDADE = 9.8;
const ALTURA_ONIBUS = 1000;
const ALTURA_GLIDER = 300;

const VELOCIDADE_MAX = 60;
const VELOCIDADE_GLIDER = 25;

function simularQueda() {
    let altura = ALTURA_ONIBUS;
    let velocidade = 0;
    let t = 0;
    let dt = 0.016;

    while (altura > ALTURA_GLIDER) {
        velocidade += GRAVIDADE * dt;
        if (velocidade > VELOCIDADE_MAX) velocidade = VELOCIDADE_MAX;
        altura -= velocidade * dt;
        t += dt;
    }
    return t;
}

function simularGlider() {
    let altura = ALTURA_GLIDER;
    let tempo = 0;
    let dt = 0.016;

    while (altura > 0) {
        altura -= VELOCIDADE_GLIDER * dt;
        tempo += dt;
    }
    return tempo;
}

function melhorTiming(altura, velocidade){
    if(altura <= 250) return "🔥 ABRIR AGORA";
    if(velocidade > 50 && altura < 400) return "⚠️ PREPARAR";
    return "⬇️ MERGULHAR";
}

// ======================
// 🎯 INTERAÇÃO
// ======================

function setPonto(tipo){
    modo = tipo;
}

canvas.addEventListener("click", (e)=>{
    const x = (e.offsetX - offsetX)/escala;
    const y = (e.offsetY - offsetY)/escala;

    if(modo){
        pontos[modo] = {x,y};
        modo = null;
        calcular();
    }
});

// zoom
canvas.addEventListener("wheel", (e)=>{
    e.preventDefault();
    escala *= e.deltaY < 0 ? 1.1 : 0.9;
});

// arrastar
canvas.addEventListener("mousedown",(e)=>{
    dragging=true;
    lastX=e.clientX;
    lastY=e.clientY;
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",(e)=>{
    if(dragging){
        offsetX += e.clientX - lastX;
        offsetY += e.clientY - lastY;
        lastX=e.clientX;
        lastY=e.clientY;
    }
});

// ======================
// 📏 DISTÂNCIAS
// ======================

function distancia(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function distanciaAteLinha(p, a, b){
    const A = p.x - a.x;
    const B = p.y - a.y;
    const C = b.x - a.x;
    const D = b.y - a.y;

    const dot = A*C + B*D;
    const len_sq = C*C + D*D;
    let param = dot / len_sq;

    let xx, yy;

    if(param < 0){
        xx = a.x;
        yy = a.y;
    } else if(param > 1){
        xx = b.x;
        yy = b.y;
    } else {
        xx = a.x + param * C;
        yy = a.y + param * D;
    }

    return Math.hypot(p.x - xx, p.y - yy);
}

// ======================
// 🤖 IA MELHOR DROP
// ======================

function avaliarPonto(p){
    const distLinha = distanciaAteLinha(p, pontos.busStart, pontos.busEnd);

    const centro = {x: img.width/2, y: img.height/2};
    const distCentro = distancia(p, centro);

    let score = 0;

    score += distLinha * 1.5;
    score -= distCentro * 0.3;

    return score;
}

function autoDrop(){
    if(!pontos.busStart || !pontos.busEnd){
        alert("Defina o ônibus primeiro!");
        return;
    }

    let melhor = null;
    let melhorScore = Infinity;

    for(let x = 0; x < img.width; x += 40){
        for(let y = 0; y < img.height; y += 40){

            let p = {x,y};
            let score = avaliarPonto(p);

            if(score < melhorScore){
                melhorScore = score;
                melhor = p;
            }
        }
    }

    pontos.drop = melhor;

    pontos.glider = {
        x: melhor.x + 60,
        y: melhor.y + 60
    };

    calcular();
}

// ======================
// 🧠 CÁLCULO
// ======================

function calcular(){
    if(!pontos.drop || !pontos.glider) return;

    const dist = distancia(pontos.drop,pontos.glider);

    const tempoQueda = simularQueda();
    const tempoGlider = simularGlider();
    const tempoTotal = tempoQueda + tempoGlider;

    const decisao = melhorTiming(ALTURA_GLIDER, VELOCIDADE_MAX);

    document.getElementById("hud").innerHTML = `
        Tempo total: ${tempoTotal.toFixed(1)}s<br>
        Queda: ${tempoQueda.toFixed(1)}s<br>
        Glider: ${tempoGlider.toFixed(1)}s<br>
        Distância: ${dist.toFixed(0)} px<br>
        Decisão: ${decisao}
    `;
}

// ======================
// ➤ SETAS ÔNIBUS
// ======================

function drawArrow(x, y, angle){
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    ctx.fillStyle = "#ffffffcc";

    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(-10, -6);
    ctx.lineTo(-10, 6);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
}

// ======================
// 🎨 DESENHO
// ======================

function draw(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    ctx.setTransform(escala,0,0,escala,offsetX,offsetY);

    ctx.clearRect(-offsetX/escala,-offsetY/escala,canvas.width/escala,canvas.height/escala);

    ctx.drawImage(img,0,0);

    // ônibus com setas
    if(pontos.busStart && pontos.busEnd){

        const x1 = pontos.busStart.x;
        const y1 = pontos.busStart.y;
        const x2 = pontos.busEnd.x;
        const y2 = pontos.busEnd.y;

        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        const angle = Math.atan2(y2 - y1, x2 - x1);
        const dist = Math.hypot(x2 - x1, y2 - y1);

        for(let i = 0; i < dist; i += 25){
            const x = x1 + Math.cos(angle) * i;
            const y = y1 + Math.sin(angle) * i;
            drawArrow(x, y, angle);
        }
    }

    // trajetória
    if(pontos.drop && pontos.glider){
        ctx.strokeStyle="orange";
        ctx.beginPath();
        ctx.moveTo(pontos.drop.x,pontos.drop.y);
        ctx.lineTo(pontos.glider.x,pontos.glider.y);
        ctx.stroke();
    }

    // pontos
    for(let key in pontos){
        if(pontos[key]){
            ctx.fillStyle = key==="drop"?"orange":
                            key==="glider"?"green":
                            key==="busStart"?"blue":
                            key==="busEnd"?"red":"white";

            ctx.beginPath();
            ctx.arc(pontos[key].x,pontos[key].y,6,0,Math.PI*2);
            ctx.fill();
        }
    }

    requestAnimationFrame(draw);
}

function resetar(){
    pontos = {
        busStart:null,
        busEnd:null,
        drop:null,
        glider:null
    };
    document.getElementById("hud").innerHTML="HUD";
}

img.onload = draw;
</script>

</body>
</html>
